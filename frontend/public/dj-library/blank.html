<!DOCTYPE html>
<html lang="en" data-skin="neon">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blank Page · DJ Library</title>
  <link rel="stylesheet" href="assets/css/main.css">
  <script src="assets/js/data.js" defer></script>
  <script src="assets/js/layout.js" defer></script>
  <script src="assets/js/main.js" defer></script>
</head>
<body>
  <div class="mobile-overlay"></div>
  <div class="app">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main">
      <header class="topbar" id="topbar"></header>
      <div class="page" data-testid="page-blank">
        <div class="page-hero anim-up">
          <div>
            <h2>Blank Page</h2>
            <p class="sub">Reusable base layout — copy this as a starting point for new features.</p>
          </div>
          <div class="kit-row">
            <button class="btn btn-secondary">Secondary</button>
            <button class="btn btn-primary">Primary</button>
          </div>
        </div>

        <div class="card anim-up anim-up-1" style="min-height: 480px; display: flex; align-items: center; justify-content: center;">
          <div class="empty">
            <div class="empty-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
            </div>
            <h4>Your content goes here</h4>
            <p>This is a clean slate with a full sidebar and header — ready for whatever you build next. Tables, forms, dashboards, imports… you pick.</p>
            <div class="kit-row" style="margin-top: 8px;">
              <button class="btn btn-primary">Start building</button>
              <button class="btn btn-ghost">View examples</button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      DJLayout.mount({ active: 'blank', title: 'Blank Page', crumb: 'System · Starter' });
    });
  </script>
</body>
</html>
